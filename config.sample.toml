# ================================================================================
# `ortie` configuration file.
#
# Loaded from the first valid path among:
#   - $XDG_CONFIG_HOME/ortie/config.toml
#   - $HOME/.config/ortie/config.toml
#   - $HOME/.ortierc
#
# Override with `ortie -c <PATH>` or `ORTIE_CONFIG=<PATH>`. Multiple paths can
# be passed at once, separated by `:`; the first one is the base and the rest
# are deep-merged on top of it.
#
# Run bare `ortie` to discover an account and print a ready-to-append config
# fragment (`ortie >> <path>` appends it directly); this file documents every
# field. Each `[accounts.<name>]` section declares one OAuth 2.0 account,
# picked at runtime with `-a <NAME>` (or via the `default = true` flag).
# ================================================================================

# --------------------------------------------------------------------------------
# Account
# --------------------------------------------------------------------------------

[accounts.example]

# Mark this account as the default one, used when no `-a <NAME>` is passed.
default = true

# OAuth 2.0 client credentials, as registered with your provider.
#
# `client-secret` is optional (PKCE-only public clients skip it). When set, it
# accepts the same shapes as pimalaya-config secrets: `raw`, `command`, `env`.
client-id = ""
#client-secret.raw = "secret"
#client-secret.command = "pass show ortie/example"

# --------------------------------------------------------------------------------
# Grant
# --------------------------------------------------------------------------------

# The OAuth 2.0 grant flow run by the auth commands.
#
# Possible values: "authorization-code" (default)
#grant = "authorization-code"

# --------------------------------------------------------------------------------
# Endpoints
# --------------------------------------------------------------------------------

# Endpoints given by your OAuth 2.0 provider. All optional at parse time:
# each command checks the ones it actually needs (auth get needs
# authorization + token, token refresh only token, token show none).
endpoints.authorization = ""
endpoints.token = ""

# Optional redirection endpoint. When omitted, defaults to
# `http://127.0.0.1:0` (random port chosen by the OS). Set it explicitly to
# match a redirect URI registered with the provider (e.g. `http://localhost`).
#endpoints.redirection = "http://localhost"

# --------------------------------------------------------------------------------
# Scopes, PKCE, extras and TLS
# --------------------------------------------------------------------------------

# OAuth 2.0 scopes granted to the access token.
scopes = []

# Proof Key for Code Exchange (RFC 7636), used by the authorization code
# grant. Enabled with the S256 method by default, aligning with OAuth 2.1.
#
# Possible values:
#   pkce = true    # S256 (same as the default)
#   pkce = "s256"  # explicit method
#   pkce = "plain" # escape hatch for servers rejecting S256
#   pkce = false   # disable, for servers rejecting PKCE parameters
#pkce = "s256"

# Extra parameters forwarded verbatim to the authorization request query.
# Keys are wire parameter names (no kebab-case renaming). This is the place
# for provider-specific knobs:
#
#   extras.access_type = "offline"          # Google: required for a refresh token
#   extras.prompt = "consent"               # Google: force the consent screen
#   extras.login_hint = "user@example.com"
#   extras.resource = "https://api.example.com/"  # RFC 8707 (Fastmail needs it)
#extras.access_type = "offline"

# TLS provider used for the HTTPS connection to the token endpoint.
#
# Possible values: "native-tls", "rustls-aws", "rustls-ring"
#tls = "rustls-ring"

# --------------------------------------------------------------------------------
# Auto refresh
# --------------------------------------------------------------------------------

# When true, `ortie token show` automatically refreshes the access token if it
# has expired. Equivalent to passing `--auto-refresh` on every call.
auto-refresh = false

# --------------------------------------------------------------------------------
# Storage
# --------------------------------------------------------------------------------
#
# Ortie does not persist tokens on disk by itself; both reads and writes go
# through a shell command. Any CLI that reads from / writes to stdin works.
# A few good candidates, matched to your platform / setup:
#
#   GNOME / Secret Service .... `secret-tool` (libsecret)
#   KDE ....................... `kwallet-query`, `kwalletcli`
#   macOS ..................... `security find/add-generic-password`
#   Windows ................... `cmdkey`, PowerShell `Get-Credential`
#   Headless / CI ............. `keyctl` (kernel keyutils)
#   Terminal-first, portable .. `pass`, `gopass`
#
# Two TOML shapes are accepted on every `*.command` field:
#
#   - Array form, exec-style, no shell involved. First element is the
#     program, the rest are its arguments. Whitespace / quoting follow
#     the kernel exec rules.
#
#         storage.read.command = ["pass", "show", "ortie/example"]
#
#   - String form, wrapped through the platform shell:
#     `/bin/sh -c "<string>"` on Unix, `cmd /C "<string>"` on Windows.
#     Pick this when you want pipes, glob expansion or `$VAR`
#     substitution.
#
#         storage.write.command = "pass insert -m -f ortie/example"

storage.read.command = ["pass", "show", "ortie/example"]
storage.write.command = "pass insert -m -f ortie/example"

# --------------------------------------------------------------------------------
# Hooks
# --------------------------------------------------------------------------------
#
# Each hook fires on token issuance (`on-issue`) or refresh (`on-refresh`),
# split by outcome (`success` / `error`). Both accept an optional shell
# `command` and an optional `notify` block.
#
# Success hooks receive the following environment variables on the command:
#   ACCESS_TOKEN, TOKEN_TYPE, EXPIRES_IN, REFRESH_TOKEN, SCOPE
#
# Error hooks receive: ERROR, ERROR_DESCRIPTION, ERROR_URI
#
# The `notify` block (requires the `notify` cargo feature, off by default)
# expands the same variables inside `summary` and `body` via shellexpand.
#
# Note: hook command fields accept the same array / string shapes as the
# storage commands above. Use the string form when the command needs to
# expand `$ACCESS_TOKEN`, `$EXPIRES_IN`, ... inside its arguments (the
# shell sees them as env vars); use the array form to skip the shell.

#hooks.on-issue.success.command = "logger 'ortie issued a token (expires in $EXPIRES_IN)'"
#hooks.on-issue.success.notify.summary = "Ortie"
#hooks.on-issue.success.notify.body = "Issued access token (expires in $EXPIRES_IN)"

#hooks.on-issue.error.notify.summary = "Ortie"
#hooks.on-issue.error.notify.body = "[$ERROR] Issue access token error\n$ERROR_DESCRIPTION"

#hooks.on-refresh.success.notify.summary = "Ortie"
#hooks.on-refresh.success.notify.body = "Refreshed access token (expires in $EXPIRES_IN)"

#hooks.on-refresh.error.notify.summary = "Ortie"
#hooks.on-refresh.error.notify.body = "[$ERROR] Refresh access token error\n$ERROR_DESCRIPTION"

# --------------------------------------------------------------------------------
# Provider recipes
# --------------------------------------------------------------------------------
#
# Ready-made endpoint / scope / client blocks for common providers. The
# discovery wizard fills most of these in for you; they are kept here for manual
# setups and for Microsoft Graph, which the wizard does not cover.
#
# Google
#   endpoints.authorization = "https://accounts.google.com/o/oauth2/v2/auth"
#   endpoints.token = "https://oauth2.googleapis.com/token"
#   scopes = ["https://www.googleapis.com/auth/carddav", "https://mail.google.com"]
#   extras.access_type = "offline"
#
#   Use these current endpoints, not the legacy `o/oauth2/auth` /
#   `www.googleapis.com/oauth2/v3/token` pair, which Google can reject at consent
#   with "This app is blocked"; the discovery wizard already fills the current
#   ones. Gmail and CardDAV are sensitive scopes, so an unverified own
#   application only works for accounts listed as test users on its OAuth consent
#   screen; the public Thunderbird application below is verified.
#
#   Public Thunderbird application:
#     client-id = "406964657835-aq8lmia8j95dhl1a2bvharmfk3t1hgqj.apps.googleusercontent.com"
#     client-secret.raw = "kSmqreRr0qwBWJgbf5Y-PjSU"
#     endpoints.redirection = "http://localhost"
#
#   Own application (https://developers.google.com/identity/protocols/oauth2):
#     client-id = "<your-client-id>"
#     client-secret.raw = "<your-client-secret>"
#
# Microsoft (Outlook IMAP / SMTP)
#   endpoints.authorization = "https://login.microsoftonline.com/common/oauth2/v2.0/authorize"
#   endpoints.token = "https://login.microsoftonline.com/common/oauth2/v2.0/token"
#
#   Public Thunderbird application:
#     client-id = "9e5f94bc-e8a4-4e73-b8be-63364c29d753"
#     endpoints.redirection = "https://localhost"
#
# Microsoft Graph
#   The Thunderbird application above is registered for Outlook IMAP / SMTP, not
#   for the Graph API. To mint Graph tokens (e.g. Himalaya's msgraph backend),
#   request Graph scopes from a client registered for Graph:
#
#   endpoints.authorization = "https://login.microsoftonline.com/common/oauth2/v2.0/authorize"
#   endpoints.token = "https://login.microsoftonline.com/common/oauth2/v2.0/token"
#   scopes = ["https://graph.microsoft.com/User.Read", "https://graph.microsoft.com/Mail.ReadWrite", "https://graph.microsoft.com/Mail.Send", "offline_access"]
#
#   Public Microsoft Graph PowerShell application:
#     client-id = "14d82eec-204b-4c2f-b7e8-296a70dab67e"
#     endpoints.redirection = "http://localhost"
#
#   Work or school (Entra ID) accounts receive a JWT the Graph API accepts;
#   personal Microsoft accounts may be issued an opaque token the API rejects
#   with InvalidAuthenticationToken, so prefer a work / school account or your
#   own registered application.
#
# Fastmail
#   Fastmail advertises RFC 7591 dynamic registration, so bare `ortie` can
#   register a client for you. Two Fastmail specifics the wizard does not yet
#   fill into the fragment, so add them by hand:
#
#     1. RFC 8707 resource. Fastmail's authorize endpoint rejects the request
#        with `invalid_target` (no consent screen, an instant bounce) unless a
#        resource indicator is present. Its value is the JMAP session URL.
#
#     2. Redirect. Fastmail's dynamic registration accepts only a reverse-DNS
#        private-use scheme (it refuses http and loopback), so the wizard pins
#        `endpoints.redirection = "org.pimalaya.ortie://redirect"`. A desktop
#        browser cannot route that scheme back to ortie, so `auth get` prints a
#        manual `auth resume` command to finish the flow by hand.
#
#   endpoints.authorization = "https://api.fastmail.com/oauth/authorize"
#   endpoints.token = "https://api.fastmail.com/oauth/refresh"
#   scopes = ["urn:ietf:params:oauth:scope:mail", "urn:ietf:params:oauth:scope:contacts", "urn:ietf:params:oauth:scope:calendars", "offline_access"]
#   extras.resource = "https://api.fastmail.com/jmap/session"
#
#   The wizard selects all four advertised scopes by default (Fastmail cannot
#   complete on a desktop anyway; trim them in the scope multi-select if you
#   want). The pre-registered Thunderbird application (offered by the wizard)
#   covers Fastmail with a loopback redirect instead, avoiding the manual resume;
#   see docs/providers.md and docs/discovery-layering.md for why dynamic
#   registration forces the private-use scheme.
